{% set name = "xcube-stac" %}
{% set version = "1.3.1" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/xcube-dev/xcube-stac/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 6924bfccfec553f5e022a9bb44cd4aa2f8666dfda8829b6dcad4eaa5d8ad3dd6

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - boto3 >=1.37.3
    - dask
    - libgdal-jp2openjpeg
    - libgdal-netcdf
    - numpy
    - pandas
    - planetary-computer
    - pyproj
    - pystac
    - pystac-client
    - rasterio
    - requests
    - rioxarray
    - xarray
    - xmltodict
    - xcube >=1.13.1
    - xcube-resampling >=0.3.2

test:
  requires:
    - python {{ python_min }}
  imports:
    - xcube_stac

about:
  summary: xcube-stac provides a data store for accessing data from STAC (SpatioTemporal Asset Catalogs).
  home: https://github.com/xcube-dev/xcube-stac
  license: MIT
  license_family: MIT
  license_file: LICENSE
  description: xcube-stac is a Python package
  dev_url: https://github.com/xcube-dev/xcube-stac

extra:
  recipe-maintainers:
    - AliceBalfanz
    - pont-us
    - b-yogesh
    - clarasb
    - forman
    - konstntokas
    - TejasMorbagal
    - thomasstorm
    - TonioF
